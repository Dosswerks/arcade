<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dosswerks Arcade — Browser Games by Andrew Doss</title>
  <meta name="description" content="Play free browser-based arcade games. A retro-inspired game showcase featuring original titles in an immersive Flynn's Arcade-style experience.">

  <!-- Open Graph -->
  <meta property="og:title" content="Dosswerks Arcade">
  <meta property="og:description" content="Play free browser-based arcade games. A retro-inspired game showcase.">
  <meta property="og:image" content="og-image.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dosswerks.github.io/arcade/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dosswerks Arcade">
  <meta name="twitter:description" content="Play free browser-based arcade games. A retro-inspired game showcase.">
  <meta name="twitter:image" content="og-image.jpg">

  <!-- Plausible Analytics — replace YOUR_DOMAIN with your actual domain -->
  <script defer data-domain="YOUR_DOMAIN" src="https://plausible.io/js/script.js"></script>

  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body class="arcade-page">

  <!-- Skip-to-content link — first focusable element (Req 16.9) -->
  <a href="#game-carousel" class="skip-link">Skip to games</a>

  <noscript>
    <div class="noscript-fallback">
      <h1 class="neon-logo">DOSSWERKS ARCADE</h1>
      <p>Dosswerks Arcade requires JavaScript to run.</p>
    </div>
  </noscript>

  <div class="brick-facade">

    <!-- Header — Neon logo area (Req 1) -->
    <header class="site-header">
      <h1 class="neon-logo">DOSSWERKS ARCADE</h1>
    </header>

    <!-- Main — Carousel and game content -->
    <main>
      <section
        id="game-carousel"
        class="carousel"
        role="region"
        aria-label="Game carousel"
        aria-roledescription="carousel"
      >
        <!-- Carousel navigation (Req 3, 16.1–16.2) -->
        <nav class="carousel-nav" aria-label="Carousel navigation">
          <button class="carousel-btn carousel-btn--prev" aria-label="Previous game">
            <span aria-hidden="true">&#8249;</span>
          </button>
          <button class="carousel-btn carousel-btn--next" aria-label="Next game">
            <span aria-hidden="true">&#8250;</span>
          </button>
        </nav>

        <!-- Card track — JS will inject real cards here; skeleton cards show before JS loads (Req 19.1) -->
        <div class="carousel-track">
          <div class="skeleton-card" aria-hidden="true"></div>
          <div class="skeleton-card" aria-hidden="true"></div>
          <div class="skeleton-card" aria-hidden="true"></div>
        </div>

        <!-- Screen-reader live region for carousel position announcements (Req 16.8) -->
        <div class="sr-announcements" aria-live="polite" aria-atomic="true"></div>
      </section>

      <!-- UI controls — mute toggle, pause/play (Req 7.6, 16.7) -->
      <div class="ui-controls">
        <button class="mute-toggle" aria-label="Mute audio" aria-pressed="false">
          <span class="mute-toggle__icon" aria-hidden="true">🔊</span>
        </button>
        <button class="pause-toggle" aria-label="Pause animations" aria-pressed="false">
          <span class="pause-toggle__icon" aria-hidden="true">⏸</span>
        </button>
      </div>
    </main>

    <!-- Footer (Req 8.4, 13.5) -->
    <footer class="site-footer">
      <p class="footer-copyright">&copy; 2026 <a href="https://andrewdoss.com" target="_blank" rel="noopener noreferrer" style="color:var(--color-neon-amber);text-decoration:none;opacity:0.8;">Andrew Doss</a></p>
      <p class="game-count" aria-live="polite">
        <!-- Game count populated by JS -->
        <span class="game-count__number">0</span> games
      </p>
      <div class="tip-jar-section" style="margin-top:1.5rem;text-align:center;">
        <p style="font-size:14px;color:var(--color-text-muted);line-height:1.6;margin-bottom:10px;">Enjoying the arcade? Tips help keep the games coming!</p>
        <div style="display:flex;align-items:center;justify-content:center;gap:20px;">
          <form action="https://www.paypal.com/donate" method="post" target="_blank">
            <input type="hidden" name="hosted_button_id" value="HDD77QKGC6XXN">
            <button type="submit" style="padding:0;background:none;border:none;cursor:pointer;display:inline-flex;flex-direction:column;align-items:center;gap:4px;transition:transform 0.2s" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
              <svg xmlns="http://www.w3.org/2000/svg" width="80" height="100" viewBox="0 0 80 100" fill="none">
                <rect x="16" y="8" width="48" height="8" rx="2" fill="#aaa"/>
                <rect x="34" y="2" width="12" height="8" rx="2" fill="#999"/>
                <rect x="36" y="4" width="8" height="3" rx="1" fill="#777"/>
                <path d="M18 16 L16 82 Q16 90 24 90 L56 90 Q64 90 64 82 L62 16 Z" fill="rgba(180,220,255,0.18)" stroke="rgba(200,230,255,0.5)" stroke-width="2"/>
                <path d="M22 20 L21 75" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
                <text x="40" y="38" text-anchor="middle" font-size="9" font-weight="bold" fill="rgba(255,255,255,0.7)" font-family="sans-serif" letter-spacing="1">TIP JAR</text>
                <g transform="rotate(-12 40 55)"><rect x="26" y="48" width="30" height="16" rx="2" fill="#3a7d44"/><text x="41" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ec77a" font-family="serif">$</text></g>
                <g transform="rotate(8 40 60)"><rect x="24" y="54" width="30" height="16" rx="2" fill="#2e6b38"/><text x="39" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#5cb868" font-family="serif">$</text></g>
                <g transform="rotate(-5 40 65)"><rect x="28" y="62" width="30" height="16" rx="2" fill="#357a3f"/><text x="43" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#7dd48a" font-family="serif">$</text></g>
                <ellipse cx="30" cy="78" rx="6" ry="3" fill="#d4a017" stroke="#b8860b" stroke-width="1"/>
                <ellipse cx="42" cy="80" rx="5" ry="2.5" fill="#daa520" stroke="#b8860b" stroke-width="1"/>
                <ellipse cx="52" cy="77" rx="5" ry="3" fill="#c9960c" stroke="#a07608" stroke-width="1"/>
              </svg>
            </button>
          </form>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div id="qr-code" style="background:#fff;padding:4px;border-radius:4px;"></div>
            <span style="font-size:12px;color:var(--color-text-muted);">Scan to tip</span>
          </div>
        </div>
      </div>
    </footer>

  </div><!-- /.brick-facade -->

  <script type="module" src="js/app.js"></script>
  <script>
    (function(){
      var qr = qrcode(0, 'L');
      qr.addData('https://www.paypal.com/donate/?hosted_button_id=HDD77QKGC6XXN');
      qr.make();
      var el = document.getElementById('qr-code');
      if (el) el.innerHTML = qr.createSvgTag({cellSize:2, margin:0});
    })();
  </script>

  <!--
    RETURN TO ARCADE — Copy-paste snippet for individual game pages:

    <a href="https://yourusername.github.io/dosswerks-arcade/#game-slug"
       style="position:fixed;top:10px;left:10px;color:#ffb347;font-family:monospace;
              font-size:12px;text-decoration:none;opacity:0.7;z-index:999;">
      ← Back to Arcade
    </a>
  -->
</body>
</html>
